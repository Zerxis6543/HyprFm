# .github/workflows/sidecar-release.yml
#
# HyprFM Sidecar — Release Pipeline
# ─────────────────────────────────────────────────────────────────────────────
# Triggered exclusively by version tags (e.g. v1.2.3).
# Produces two self-contained, single-file .NET 8 executables:
#   • hyprfm-sidecar-win-x64.exe
#   • hyprfm-sidecar-linux-x64
#
# FIX v2: Two bugs corrected from v1:
#   1. Windows .NET RID is "win-x64", NOT "windows-x64".
#      Using the wrong RID caused dotnet publish to write to a different
#      directory than the rename step was reading from.
#   2. Removed the fragile `find *.exe` bash command on the Windows runner.
#      Instead, we force dotnet to write the binary with a known filename
#      via /p:AssemblyName at publish time, so no post-publish renaming is
#      needed at all. The output path is always deterministic.
# ─────────────────────────────────────────────────────────────────────────────

name: Sidecar Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

concurrency:
  group: sidecar-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  # ── CHANGE THIS to match the actual path of your .csproj ──────────────────
  SIDECAR_PROJECT: "sidecar/HyprFmSidecar.csproj"

jobs:
  # ── Job 1: Build Matrix ─────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: true
      matrix:
        include:
          # ── CRITICAL: .NET Runtime Identifier for Windows is "win-x64". ───
          # "windows-x64" is a GitHub runner label, NOT a .NET RID.
          # Mixing these up is the most common cause of "binary not found" errors.
          - rid:        win-x64
            runner:     windows-latest
            asset_name: hyprfm-sidecar-win-x64.exe
            label:      "Windows x64"

          - rid:        linux-x64
            runner:     ubuntu-latest
            asset_name: hyprfm-sidecar-linux-x64
            label:      "Linux x64"

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. .NET SDK Setup ─────────────────────────────────────────────────
      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ── 3. Confirm Build Environment ──────────────────────────────────────
      # Writes an unambiguous log entry confirming the exact RID being targeted.
      # Always check this line first when debugging a binary mismatch.
      - name: Confirm build environment
        shell: bash
        run: |
          echo "════════════════════════════════════════════"
          echo "  HyprFM Sidecar — Build Confirmation"
          echo "════════════════════════════════════════════"
          echo "  Tag         : ${{ github.ref_name }}"
          echo "  Commit      : ${{ github.sha }}"
          echo "  .NET RID    : ${{ matrix.rid }}"
          echo "  Asset Name  : ${{ matrix.asset_name }}"
          echo "  Runner OS   : ${{ runner.os }}"
          echo "  .NET SDK    : $(dotnet --version)"
          echo "════════════════════════════════════════════"

      # ── 4. Restore NuGet Packages ─────────────────────────────────────────
      - name: Restore NuGet packages
        shell: bash
        run: |
          dotnet restore "${{ env.SIDECAR_PROJECT }}" \
            --runtime ${{ matrix.rid }} \
            --verbosity minimal

      # ── 5. Publish — Self-Contained Single-File Executable ────────────────
      #
      # KEY FIX: We pass /p:AssemblyName to force the output binary to be
      # named exactly "hyprfm-sidecar-win-x64" or "hyprfm-sidecar-linux-x64"
      # at compile time. This eliminates any post-publish rename step and the
      # fragile `find` command that caused the v1 failure.
      #
      # The output directory is flat: dist/<asset_name>[.exe]
      # We know exactly what file will exist before the step runs.
      #
      # Flag reference:
      #   --self-contained true                    Bundle .NET runtime into binary
      #   /p:PublishSingleFile=true                Merge all DLLs into one file
      #   /p:PublishTrimmed=true                   Strip unused framework code
      #   /p:EnableCompressionInSingleFile=true    Brotli-compress embedded libs
      #   /p:DebugType=none                        No .pdb in release binary
      #   /p:AssemblyName=<asset>                  Force output filename (THE FIX)
      #   /p:IncludeNativeLibrariesForSelfExtract=true  Bundle native libs (TLS etc.)
      - name: Publish self-contained binary
        shell: bash
        run: |
          # Strip the .exe extension to get a clean AssemblyName on both platforms.
          # dotnet adds .exe automatically on Windows; we must NOT double-add it.
          ASSEMBLY_NAME="${{ matrix.asset_name }}"
          ASSEMBLY_NAME="${ASSEMBLY_NAME%.exe}"

          dotnet publish "${{ env.SIDECAR_PROJECT }}" \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:PublishTrimmed=true \
            /p:EnableCompressionInSingleFile=true \
            /p:DebugType=none \
            /p:IncludeNativeLibrariesForSelfExtract=true \
            "/p:AssemblyName=${ASSEMBLY_NAME}" \
            --output "dist" \
            --verbosity normal

          echo ""
          echo "── dist/ contents after publish ─────────────"
          ls -lh dist/

      # ── 6. Verify the Expected Asset Exists ───────────────────────────────
      # This step exists purely to produce a clear, early failure message
      # instead of a confusing "file not found" error inside the upload step.
      # If this fails, check the AssemblyName override above and the .csproj.
      - name: Verify asset exists
        shell: bash
        run: |
          EXPECTED="dist/${{ matrix.asset_name }}"

          echo "── Verifying asset ──────────────────────────"
          echo "  Expected : $EXPECTED"

          if [[ ! -f "$EXPECTED" ]]; then
            echo ""
            echo "ERROR: Expected binary not found."
            echo "Actual contents of dist/:"
            ls -la dist/
            exit 1
          fi

          # Set executable bit on Linux so operators don't need chmod +x.
          if [[ "${{ matrix.rid }}" == linux* ]]; then
            chmod +x "$EXPECTED"
          fi

          FILE_SIZE=$(ls -lh "$EXPECTED" | awk '{print $5}')
          echo "  Status   : FOUND ✓"
          echo "  Size     : $FILE_SIZE"
          echo "  RID      : ${{ matrix.rid }} (${{ matrix.label }})"

      # ── 7. Upload Binary as Workflow Artifact ─────────────────────────────
      # The release job runs on a separate runner; workflow artifacts are the
      # only way to pass files between jobs in GitHub Actions.
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.rid }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 1
          if-no-files-found: error

  # ── Job 2: Checksum & Release ───────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Download both binaries from matrix legs ────────────────────────────
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      # ── Confirm both files arrived ────────────────────────────────────────
      - name: Confirm downloaded assets
        run: |
          echo "════════════════════════════════════════════"
          echo "  Assets ready for release"
          echo "════════════════════════════════════════════"
          ls -lh release-assets/

          FILE_COUNT=$(find release-assets/ -maxdepth 1 -type f | wc -l)
          echo "  File count : $FILE_COUNT (expected 2)"

          if [[ "$FILE_COUNT" -ne 2 ]]; then
            echo "ERROR: Expected 2 binaries, found $FILE_COUNT. Aborting."
            exit 1
          fi

      # ── Generate SHA256 checksum manifest ─────────────────────────────────
      # Single manifest covers both binaries.
      # Operators verify with: sha256sum --check SHA256SUMS.txt
      - name: Generate SHA256 checksum manifest
        run: |
          cd release-assets/
          sha256sum hyprfm-sidecar-* > SHA256SUMS.txt

          echo "── SHA256SUMS.txt ───────────────────────────"
          cat SHA256SUMS.txt

      # ── Build self-documenting release notes ──────────────────────────────
      - name: Build release body
        id: release_body
        run: |
          TAG="${{ github.ref_name }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          cat > /tmp/release_body.md << EOF
          ## HyprFM Sidecar ${TAG}

          > **Commit:** \`${SHORT_SHA}\` · **Built by:** GitHub Actions

          ### Installation

          Self-contained binary — **no .NET runtime required on the server.**

          | Platform | File |
          |---|---|
          | Windows 64-bit | \`hyprfm-sidecar-win-x64.exe\` |
          | Linux 64-bit   | \`hyprfm-sidecar-linux-x64\`   |

          **Linux — mark executable before first run:**
          \`\`\`bash
          chmod +x hyprfm-sidecar-linux-x64
          ./hyprfm-sidecar-linux-x64
          \`\`\`

          **Verify integrity:**
          \`\`\`bash
          sha256sum --check SHA256SUMS.txt
          \`\`\`

          ### Environment Variables

          | Variable | Default | Description |
          |---|---|---|
          | \`STDB_URI\`   | \`ws://127.0.0.1:3000\` | SpacetimeDB WebSocket URI |
          | \`STDB_DB\`    | \`fivem-game\`          | SpacetimeDB database name |
          | \`STDB_TOKEN\` | *(empty)*               | SpacetimeDB auth token    |
          EOF

          echo "body_path=/tmp/release_body.md" >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release and attach all three assets ─────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "HyprFM Sidecar ${{ github.ref_name }}"
          body_path:  ${{ steps.release_body.outputs.body_path }}
          draft:      false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/hyprfm-sidecar-win-x64.exe
            release-assets/hyprfm-sidecar-linux-x64
            release-assets/SHA256SUMS.txt
          fail_on_unmatched_files: true